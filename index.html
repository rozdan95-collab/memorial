<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <title>לוח הנצחה - בית כנסת הראל</title>
    <style>
        @font-face { font-family: 'Siddur'; src: local('Guttman Stam'), local('David'); }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: 'Siddur', serif; }
        body { display: flex; flex-direction: column; color: #fff; }
        
        #header { 
            height: 18vh; background: linear-gradient(135deg, #041d29 0%, #000 50%, #041d29 100%); 
            display: flex; align-items: center; justify-content: space-between; padding: 0 40px; border-bottom: 3px solid #d4af37; 
        }
        #header h1 { margin: 0; font-size: 3.5vw; background: linear-gradient(to bottom, #f1d279 0%, #d4af37 50%, #a67c00 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #clock { font-size: 2.8vw; color: #fff; font-weight: bold; font-family: monospace; }
        #today-date { font-size: 1.6vw; color: #f1d279; font-weight: bold; }
        
        #main-zone { 
            flex: 1; background: radial-gradient(circle at center, #0b3d54 0%, #000 85%); 
            display: flex; flex-wrap: wrap; justify-content: center; align-content: center; gap: 20px; padding: 15px; 
        }
        
        .card { 
            background: #f0f0f0 !important; border: 2px solid #d4af37 !important; border-radius: 15px; 
            width: 31%; height: 36vh; display: flex; flex-direction: column; align-items: center; text-align: center; 
            padding: 15px; position: relative; box-sizing: border-box; box-shadow: 0 15px 35px rgba(0,0,0,0.6); 
        }
        
        /* עיצוב שנת אבל - בולט עם מסגרת כפולה */
        .card.first-year-style { border: 6px double #d4af37 !important; background: #fff !important; }

        .name { 
            font-size: 2.6vw; font-weight: bold; margin-top: 20px; width: 92%; line-height: 1.1;
            background: linear-gradient(to bottom, #f1d279 0%, #d4af37 50%, #a67c00 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 1.5px 1.5px rgba(0,0,0,0.5)); 
        }
        
        .parents { font-size: 1.6vw; color: #333; margin-top: 8px; font-weight: bold; }
        .date { font-size: 1.5vw; color: #8a6d3b; font-weight: bold; margin-top: 8px; }
        .donor { margin-top: auto; font-size: 1.1vw; color: #a67c00; border-top: 1px solid rgba(0,0,0,0.1); width: 90%; padding-top: 8px; font-style: italic; }
        .year-label { background: #d4af37; color: #000; font-weight: bold; font-size: 1vw; padding: 2px 12px; border-radius: 4px; margin-top: 5px; }
        
        #footer { height: 7vh; background: #052a3b; color: #f1d279; display: flex; align-items: center; justify-content: center; border-top: 3px solid #d4af37; font-size: 3.5vh; font-weight: bold; }
        
        .candle-box { position: absolute; top: 10px; left: 10px; width: 30px; height: 50px; }
        .flame-real { position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%); width: 12px; height: 24px; background: radial-gradient(ellipse at bottom, #fff 0%, #fffb00 30%, #ff6600 70%, rgba(255,102,0,0) 100%); border-radius: 50% 50% 35% 35%; animation: flicker-strong 0.1s infinite alternate; box-shadow: 0 0 15px #ff6600; }
        .wax-real { position: absolute; bottom: 0; left: 50%; width: 16px; height: 20px; background: linear-gradient(to right, #a67c00, #f1d279, #a67c00); transform: translateX(-50%); border-radius: 2px; }
        @keyframes flicker-strong { 0% { opacity: 0.4; transform: translateX(-52%) scale(0.85); } 100% { opacity: 1; transform: translateX(-50%) scale(1.15); } }
    </style>
</head>
<body>

<div id="header">
    <div style="flex:1"></div>
    <h1>בית כנסת הראל</h1>
    <div id="clock-box" style="flex:1; text-align:left;">
        <div id="clock">00:00:00</div>
        <div id="today-date">טוען...</div>
    </div>
</div>

<div id="main-zone">מתחבר למאגר הנתונים...</div>
<div id="footer">תהא נשמתם צרורה בצרור החיים</div>

<script>
    const SHEET_ID = '1EHY_LctfSc7P-tSNexAlI_ie-KFTboIjM2YGHh8KoVU';
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

    function numberToHebrew(num) {
        let n = parseInt(num); if (isNaN(n)) return num;
        if (n === 15) return 'ט"ו'; if (n === 16) return 'ט"ז';
        const u = ["", "א", "ב", "ג", "ד", "ה", "ו", "ז", "ח", "ט"], t = ["", "י", "כ", "ל"];
        let h = n >= 10 ? t[Math.floor(n/10)] + u[n%10] : u[n];
        return h.length > 1 ? h.slice(0,-1) + '"' + h.slice(-1) : h + "'";
    }

    // פונקציה שמייצרת רשימה של 11 התאריכים הבאים (היום + 10)
    function getUpcomingDates() {
        let dates = [];
        for (let i = 0; i <= 10; i++) {
            let d = new Date();
            d.setDate(d.getDate() + i);
            let day = parseInt(new Intl.DateTimeFormat('he-u-ca-hebrew', {day:'numeric'}).format(d));
            let month = new Intl.DateTimeFormat('he-u-ca-hebrew', {month:'long'}).format(d);
            dates.push({ day, month });
        }
        return dates;
    }

    async function loadData() {
        try {
            const res = await fetch(url);
            const text = await res.text();
            const json = JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1));
            const rows = json.table.rows;
            const upcoming = getUpcomingDates();
            
            const allParsed = rows.map(r => {
                const c = r.c;
                const getT = (idx) => (c[idx] && c[idx].v !== null) ? (c[idx].f ? c[idx].f : c[idx].v.toString()).trim() : "";
                let fName = getT(2), mName = getT(3);
                return {
                    name: getT(0), 
                    parents: (fName || mName) ? `${getT(1)} ${fName} ו${mName}`.replace(/ ו$/, "") : "",
                    dayVal: parseInt(getT(4)), 
                    month: getT(5), 
                    year: getT(6), 
                    donor: getT(7),
                    isFirstYear: (c[9] && getT(9).includes("שנה"))
                };
            }).filter(p => p.name !== "");

            // סינון: מי שנמצא ב-11 הימים הקרובים או בשנת אבל
            const filtered = allParsed.filter(p => {
                if (p.isFirstYear) return true;
                return upcoming.some(u => u.day === p.dayVal && u.month === p.month);
            });

            // מיון: קודם מי שחל היום, אחר כך לפי סדר התאריכים
            filtered.sort((a, b) => a.dayVal - b.dayVal);

            render(filtered);
        } catch (e) {
            document.getElementById('main-zone').innerHTML = "<h2>שגיאה בטעינת הנתונים</h2>";
        }
    }

    function render(data) {
        const container = document.getElementById('main-zone');
        if (data.length === 0) {
            container.innerHTML = "<h2>אין אזכרות לימים הקרובים</h2>";
            return;
        }
        container.innerHTML = data.map(p => `
            <div class="card ${p.isFirstYear ? 'first-year-style' : ''}">
                <div class="candle-box"><div class="flame-real"></div><div class="wax-real"></div></div>
                <div class="name">${p.name}</div>
                <div class="parents">${p.parents}</div>
                <div class="date">${numberToHebrew(p.dayVal)} ב${p.month} ${p.year}</div>
                ${p.isFirstYear ? '<div class="year-label">שנת אבל</div>' : ''}
                <div class="donor">${p.donor ? `לעילוי נשמת: ${p.donor}` : ''}</div>
            </div>
        `).join('');
    }

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('he-IL', {hour12:false});
        const options = { day: 'numeric', month: 'long', year: 'numeric' };
        document.getElementById('today-date').innerText = new Intl.DateTimeFormat('he-u-ca-hebrew', options).format(new Date());
    }, 1000);
    
    loadData();
    setInterval(loadData, 1800000); // רענון נתונים כל חצי שעה
</script>
</body>
</html>
