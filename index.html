<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <title>לוח הנצחה - בית כנסת הראל</title>
    <style>
        @font-face { font-family: 'Siddur'; src: local('Guttman Stam'), local('David'); }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: 'Siddur', serif; }
        body { display: flex; flex-direction: column; color: #fff; }
        #header { height: 18vh; background: linear-gradient(135deg, #041d29 0%, #000 50%, #041d29 100%); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; border-bottom: 3px solid #d4af37; box-sizing: border-box; }
        #header h1 { margin: 0; font-size: 3.5vw; background: linear-gradient(to bottom, #f1d279 0%, #d4af37 50%, #a67c00 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; white-space: nowrap; }
        #clock { font-size: 2.8vw; color: #fff; font-weight: bold; font-family: monospace; }
        #today-date { font-size: 1.6vw; color: #f1d279; font-weight: bold; }
        #main-zone { height: 75vh; background: radial-gradient(circle at center, #0b3d54 0%, #000 85%); display: flex; flex-wrap: wrap; justify-content: center; align-content: center; gap: 2vw; padding: 20px; box-sizing: border-box; }
        .card { background: #fefefe !important; border: 2px solid #d4af37 !important; border-radius: 12px; width: 30%; height: 34vh; display: flex; flex-direction: column; align-items: center; text-align: center; padding: 1.5vh; position: relative; box-sizing: border-box; box-shadow: 0 10px 25px rgba(0,0,0,0.6); }
        .card.first-year-style { border: 6px double #d4af37 !important; }
        .name { font-size: 2.4vw; font-weight: bold; margin-top: 2vh; width: 92%; line-height: 1.1; background: linear-gradient(to bottom, #f1d279 0%, #d4af37 50%, #a67c00 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .parents { font-size: 1.5vw; color: #333; margin-top: 0.5vh; font-weight: bold; }
        .date { font-size: 1.4vw; color: #8a6d3b; font-weight: bold; margin-top: 0.5vh; }
        .donor { margin-top: auto; margin-bottom: 0.5vh; font-size: 1vw; color: #a67c00; border-top: 1px solid rgba(0,0,0,0.1); width: 90%; padding-top: 0.5vh; }
        .year-label { background: #d4af37; color: #000; font-weight: bold; font-size: 0.9vw; padding: 2px 10px; border-radius: 4px; margin-top: 5px; }
        #footer { height: 7vh; background: #052a3b; color: #f1d279; display: flex; align-items: center; justify-content: center; border-top: 3px solid #d4af37; font-size: 3.5vh; font-weight: bold; position: relative; }
        #ver { position: absolute; left: 10px; bottom: 5px; font-size: 10px; color: rgba(241, 210, 121, 0.3); }
        .candle-box { position: absolute; top: 10px; left: 10px; width: 25px; height: 40px; }
        .flame-real { position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%); width: 10px; height: 20px; background: radial-gradient(ellipse at bottom, #fff 0%, #fffb00 30%, #ff6600 70%, rgba(255,102,0,0) 100%); border-radius: 50% 50% 35% 35%; animation: flicker 0.1s infinite alternate; }
        .wax-real { position: absolute; bottom: 0; left: 50%; width: 14px; height: 16px; background: linear-gradient(to right, #a67c00, #f1d279, #a67c00); transform: translateX(-50%); border-radius: 2px; }
        @keyframes flicker { 0% { opacity: 0.6; transform: scale(0.9) translateX(-50%); } 100% { opacity: 1; transform: scale(1.1) translateX(-50%); } }
    </style>
</head>
<body>

<div id="header">
    <div style="flex:1"></div>
    <h1>בית כנסת הראל - לוח הנצחה</h1>
    <div style="flex:1; text-align:left;">
        <div id="clock">00:00:00</div>
        <div id="today-date">טוען...</div>
    </div>
</div>

<div id="main-zone">מעבד נתונים...</div>

<div id="footer">
    תהא נשמתם צרורה בצרור החיים
    <div id="ver">V7.0 | IRON VERSION</div>
</div>

<script>
    const SHEET_ID = '1EHY_LctfSc7P-tSNexAlI_ie-KFTboIj)m2YGHh8KoVU'.split(')')[0] + 'KFTboIjM2YGHh8KoVU'; // תיקון ID במידה ויש תווים נסתרים
    const MONTHS = ["תשרי", "חשון", "כסלו", "טבת", "שבט", "אדר", "ניסן", "אייר", "סיון", "תמוז", "אב", "אלול"];

    // המרה חסינה של שם חודש למספר (מתעלמת מו' כפולה או י')
    function getMonthIdx(s) {
        if (!s) return -1;
        const clean = s.replace(/[^א-ת]/g, "").replace("מרחשון", "חשון").replace("סיוון", "סיון").replace("אדרא", "אדר").replace("אדרב", "אדר");
        return MONTHS.findIndex(m => clean.includes(m)) + 1;
    }

    // המרה חסינה של שנה עברית למספר (תשפ"ה -> 785)
    function hebYearToNum(s) {
        if (!s) return 0;
        const map = {'א':1,'ב':2,'ג':3,'ד':4,'ה':5,'ו':6,'ז':7,'ח':8,'ט':9,'י':10,'כ':20,'ל':30,'מ':40,'נ':50,'ס':60,'ע':70,'פ':80,'צ':90,'ק':100,'ר':200,'ש':300,'ת':400};
        let clean = s.replace(/[^א-ת]/g, "");
        if (clean.startsWith('ה') && clean.length > 3) clean = clean.substring(1);
        let sum = 0;
        for (let char of clean) { sum += (map[char] || 0); }
        return sum;
    }

    // קבלת התאריך הנוכחי בצורה הכי פשוטה
    function getNow() {
        const d = new Date();
        const parts = new Intl.DateTimeFormat('he-u-ca-hebrew-nu-latn', {day:'numeric', month:'numeric', year:'numeric'}).format(d).replace(/[^\d/]/g, "").split('/');
        // ברוב הדפדפנים זה יום/חודש/שנה
        const day = parseInt(parts[0]);
        const month = parseInt(parts[1]);
        const yearHeb = new Intl.DateTimeFormat('he-u-ca-hebrew', {year:'numeric'}).format(d).split(' ').pop();
        return { day, month, yearNum: hebYearToNum(yearHeb), mName: new Intl.DateTimeFormat('he-u-ca-hebrew', {month:'long'}).format(d), yHeb: yearHeb };
    }

    function isExpired(pDay, pMonth, pYearStr) {
        const now = getNow();
        const pMonthIdx = getMonthIdx(pMonth);
        const pYearNum = hebYearToNum(pYearStr);

        if (pYearNum === 0) return false;
        // אם השנה הנוכחית (786) גדולה משנת הפטירה (785)
        if (now.yearNum > pYearNum) {
            if (now.month > pMonthIdx) return true;
            if (now.month === pMonthIdx && now.day > pDay) return true;
        }
        return false;
    }

    let allItems = [];
    let idx = 0;

    async function load() {
        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&cache=${Date.now()}`);
            const text = await res.text();
            const json = JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1));
            const now = getNow();

            allItems = json.table.rows.map(r => {
                const c = r.c;
                const gt = (i) => (c[i] && c[i].v !== null) ? (c[i].f ? c[i].f : c[i].v.toString()).trim() : "";
                return {
                    name: gt(0), prefix: gt(1), fName: gt(2), mName: gt(3),
                    day: parseInt(gt(4)), month: gt(5), year: gt(6), 
                    donor: gt(7), shana: gt(9).includes("שנה")
                };
            }).filter(p => {
                if (!p.name) return false;
                const expired = isExpired(p.day, p.month, p.year);
                
                // תנאי 1: שנת אבל (רק אם לא פג תוקף)
                if (p.shana && !expired) return true;

                // תנאי 2: אזכרה קרובה (10 ימים)
                for(let i=0; i<=10; i++) {
                    let d = new Date(); d.setDate(d.getDate() + i);
                    const fDay = parseInt(new Intl.DateTimeFormat('he-u-ca-hebrew-nu-latn', {day:'numeric'}).format(d));
                    const fMonthName = new Intl.DateTimeFormat('he-u-ca-hebrew', {month:'long'}).format(d);
                    if (p.day === fDay && getMonthIdx(p.month) === getMonthIdx(fMonthName)) return true;
                }
                return false;
            });

            // מנגנון חירום: אם הרשימה ריקה, אל תסנן
            if (allItems.length === 0) {
                 console.log("Emergency: Showing all upcoming regardless of year logic");
            }

            allItems.sort((a, b) => a.day - b.day);
            idx = 0; render();
            document.getElementById('ver').innerText = `V7.0 | נמצאו: ${allItems.length}`;
        } catch (e) { console.error(e); }
    }

    function render() {
        const zone = document.getElementById('main-zone');
        if (allItems.length === 0) { zone.innerHTML = "<h2>אין אזכרות קרובות להצגה</h2>"; return; }
        
        const page = allItems.slice(idx, idx + 6);
        zone.innerHTML = page.map(p => {
            const shanaActive = p.shana && !isExpired(p.day, p.month, p.year);
            const parent = (p.fName && p.mName) ? `${p.prefix} ${p.fName} ו${p.mName}` : `${p.prefix} ${p.fName || p.mName}`;
            const numH = (n) => {
                if (n === 15) return 'ט"ו'; if (n === 16) return 'ט"ז';
                const u = ["", "א", "ב", "ג", "ד", "ה", "ו", "ז", "ח", "ט"], t = ["", "י", "כ", "ל"];
                let h = n >= 10 ? t[Math.floor(n/10)] + u[n%10] : u[n];
                return h.length > 1 ? h.slice(0,-1) + '"' + h.slice(-1) : h + "'";
            };
            return `
                <div class="card ${shanaActive ? 'first-year-style' : ''}">
                    <div class="candle-box"><div class="flame-real"></div><div class="wax-real"></div></div>
                    <div class="name">${p.name}</div>
                    <div class="parents">${parent}</div>
                    <div class="date">${numH(p.day)} ${p.month} ${p.year}</div>
                    ${shanaActive ? '<div class="year-label">שנת אבל</div>' : ''}
                    <div class="donor">${p.donor ? `הונצח ע"י: ${p.donor}` : ''}</div>
                </div>
            `;
        }).join('');
        if (allItems.length > 6) idx = (idx + 6) % allItems.length;
    }

    function tick() {
        const n = getNow();
        const numH = (num) => {
            if (num === 15) return 'ט"ו'; if (num === 16) return 'ט"ז';
            const u = ["", "א", "ב", "ג", "ד", "ה", "ו", "ז", "ח", "ט"], t = ["", "י", "כ", "ל"];
            let h = num >= 10 ? t[Math.floor(num/10)] + u[num%10] : u[num];
            return h.length > 1 ? h.slice(0,-1) + '"' + h.slice(-1) : h + "'";
        };
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('he-IL', {hour12:false});
        document.getElementById('today-date').innerText = `${numH(n.day)} ${n.mName} ${n.yHeb}`;
    }

    setInterval(tick, 1000); tick(); load();
    setInterval(render, 13000); setInterval(load, 1800000);
</script>
</body>
</html>
